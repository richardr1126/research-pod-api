<!DOCTYPE html>
<html>
<head>
    <title>Research Pod</title>
    <!-- Add the marked library for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            height: calc(100vh - 150px);
            min-height: 500px;
        }
        .left-panel, .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .panel-header {
            background-color: #f5f5f5;
            padding: 10px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }
        .panel-content {
            flex: 1;
            overflow: auto;
            padding: 10px;
        }
        pre {
            white-space: pre-wrap;
            margin: 0;
            font-family: monospace;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        input[type="text"] {
            padding: 8px;
            width: 300px;
            margin-right: 10px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        .search-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .summary-content {
            padding: 10px;
        }
        /* Markdown styling */
        .markdown-content h1 {
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .markdown-content h2 {
            color: #3498db;
            margin-top: 20px;
        }
        .markdown-content ul {
            padding-left: 20px;
        }
        .markdown-content li {
            margin-bottom: 5px;
        }
        .status-indicator {
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .status-online {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status-offline {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .toggle-container {
            display: flex;
            flex-direction: column;
            margin-left: 20px;
            border: 1px solid #ddd;
            padding: 10px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .toggle-option {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        .toggle-option label {
            margin-left: 5px;
        }
        .toggle-info {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer {
            font-family: monospace;
            font-size: 1.2em;
            padding: 8px 12px;
            background-color: #f8f9fa;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .timer.running {
            color: #0d6efd;
        }
        .timer.completed {
            color: #198754;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Research Pod</h1>
        <div id="search-timer" class="timer">00:00:00</div>
    </div>
    
    <div id="service-status" class="status-indicator status-offline">
        Checking service status...
    </div>
    
    <div class="search-container">
        <div>
            <label for="query">Search Query:</label>
            <input type="text" id="query" value="legal natural language processing">
            <button id="search-btn" onclick="makeRequest()" disabled>Search Papers</button>
        </div>
        
        <div class="toggle-container">
            <div class="toggle-option">
                <input type="checkbox" id="use-scrape" checked>
                <label for="use-scrape">Paper Scrape</label>
            </div>
            <div class="toggle-option">
                <input type="checkbox" id="use-websearch" checked>
                <label for="use-websearch">Web Search</label>
            </div>
            <div class="toggle-info" id="toggle-info">
                If both are on, do both endpoints
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="left-panel">
            <div class="panel-header">Search Results</div>
            <div class="panel-content">
                <pre id="result">Results will appear here</pre>
            </div>
        </div>
        <div class="right-panel">
            <div class="panel-header">Summary</div>
            <div class="panel-content" id="summary-container">
                <div id="summary" class="summary-content markdown-content">Summary will appear here after processing</div>
                <button id="process-btn" onclick="processPapers()" style="display:none;">Generate Summary</button>
            </div>
        </div>
    </div>

    <script>
        let paperData = null;
        let websearchData = null;
        let timerInterval = null;
        let startTime = null;
        let scrapeCompleted = false;
        let websearchCompleted = false;
        
        // Configure marked options
        marked.setOptions({
            breaks: true,  // Convert line breaks to <br>
            gfm: true      // Enable GitHub Flavored Markdown
        });
        
        // Check if the service is running when the page loads
        document.addEventListener('DOMContentLoaded', checkServiceStatus);
        
        function checkServiceStatus() {
            const statusDiv = document.getElementById('service-status');
            const searchBtn = document.getElementById('search-btn');
            
            statusDiv.className = 'status-indicator status-offline';
            statusDiv.textContent = 'Checking service status...';
            
            fetch('http://localhost:8888/v1/health', {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Service is offline');
                }
                return response.json();
            })
            .then(data => {
                statusDiv.className = 'status-indicator status-online';
                statusDiv.textContent = 'Service is online';
                searchBtn.disabled = false;
            })
            .catch(error => {
                statusDiv.className = 'status-indicator status-offline';
                statusDiv.textContent = 'Service is offline - Please start Docker';
                searchBtn.disabled = true;
            });
        }
        
        // Timer functions
        function startTimer() {
            const timerElement = document.getElementById('search-timer');
            timerElement.className = 'timer running';
            startTime = new Date();
            
            // Reset completion flags
            scrapeCompleted = false;
            websearchCompleted = false;
            
            // Clear any existing interval
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            // Update timer every 100ms
            timerInterval = setInterval(() => {
                const elapsedTime = new Date() - startTime;
                timerElement.textContent = formatTime(elapsedTime);
            }, 100);
        }
        
        function checkTimerCompletion(useScrape, useWebsearch) {
            if ((useScrape && !scrapeCompleted) || (useWebsearch && !websearchCompleted)) {
                // Still waiting for at least one search to complete
                return;
            }
            
            // All selected searches are complete, stop the timer
            stopTimer();
        }
        
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
                
                const timerElement = document.getElementById('search-timer');
                timerElement.className = 'timer completed';
            }
        }
        
        function formatTime(milliseconds) {
            const totalSeconds = Math.floor(milliseconds / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const ms = Math.floor((milliseconds % 1000) / 10);
            
            return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}.${pad(ms)}`;
        }
        
        function pad(num) {
            return num.toString().padStart(2, '0');
        }
        
        function makeRequest() {
            const query = document.getElementById('query').value;
            const resultDiv = document.getElementById('result');
            const summaryDiv = document.getElementById('summary');
            const processBtn = document.getElementById('process-btn');
            const useScrape = document.getElementById('use-scrape').checked;
            const useWebsearch = document.getElementById('use-websearch').checked;
            
            if (!useScrape && !useWebsearch) {
                alert('Please select at least one search option');
                return;
            }
            
            // Start the timer
            startTimer();
            
            resultDiv.textContent = 'Loading...';
            summaryDiv.innerHTML = 'Summary will appear here after processing';
            processBtn.style.display = 'none';
            
            // Initialize results object
            const results = {};
            let scrapePromise = Promise.resolve(null);
            let websearchPromise = Promise.resolve(null);
            
            // Start paper scrape if selected
            if (useScrape) {
                scrapePromise = fetch('http://localhost:8888/v1/scrape', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                })
                .then(response => response.json())
                .then(data => {
                    paperData = data;
                    results.papers = data;
                    updateResults(results, resultDiv);
                    
                    // Mark scrape as completed
                    scrapeCompleted = true;
                    checkTimerCompletion(useScrape, useWebsearch);
                    
                    return data;
                });
            } else {
                // If scrape not selected, mark it as completed
                scrapeCompleted = true;
            }
            
            // Start websearch if selected - now using websearch2 endpoint
            if (useWebsearch) {
                websearchPromise = fetch('http://localhost:8888/v1/websearch2', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query: query })
                })
                .then(response => response.json())
                .then(data => {
                    websearchData = data;
                    results.websearch = data.results;
                    updateResults(results, resultDiv);
                    
                    // Mark websearch as completed
                    websearchCompleted = true;
                    checkTimerCompletion(useScrape, useWebsearch);
                    
                    return data;
                });
            } else {
                // If websearch not selected, mark it as completed
                websearchCompleted = true;
            }
            
            // When either scrape or websearch is done, show process button
            Promise.all([scrapePromise, websearchPromise])
                .then(([scrapeData, websearchData]) => {
                    if (scrapeData || websearchData) {
                        processBtn.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error("Error during search:", error);
                    resultDiv.textContent += '\nError: ' + error.message;
                    
                    // Stop the timer on error
                    stopTimer();
                });
                
            // Check timer completion immediately (in case both are already marked as completed)
            checkTimerCompletion(useScrape, useWebsearch);
        }
        
        // Helper function to update results display
        function updateResults(results, resultDiv) {
            resultDiv.textContent = JSON.stringify(results, null, 2);
        }
        
        function processPapers() {
            if (!paperData) {
                alert('No paper data available. Please search for papers first.');
                return;
            }
            
            const summaryDiv = document.getElementById('summary');
            const processBtn = document.getElementById('process-btn');
            
            summaryDiv.innerHTML = '<p class="loading">Generating summary...</p>';
            processBtn.disabled = true;
            
            // Create a combined data object with both papers and websearch results
            const combinedData = {
                papers: paperData,
                websearch: websearchData ? websearchData.results : []
            };
            
            fetch('http://localhost:8888/v1/process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(combinedData)
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                // Convert markdown to HTML and set it as the innerHTML
                const markdownContent = data.summary || "No summary was generated.";
                summaryDiv.innerHTML = marked.parse(markdownContent);
                processBtn.disabled = false;
            })
            .catch(error => {
                console.error("Error processing papers:", error);
                summaryDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                processBtn.disabled = false;
            });
        }
    </script>
</body>
</html>
